<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cafe Diario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2E5235;
      --primary-hover: #3A6642;
      --bg: #A8A8A2;
      --surface: #C0C0BA;
      --border: #909088;
      --text: #18180E;
      --muted: #585850;
    }

    body { font-family: 'Special Elite', 'Courier New', monospace; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 48px; }

    /* Header */
    header { background: var(--primary); color: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 6px rgba(0,0,0,.15); }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .04em; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    #badge { background: #fff; color: var(--primary); font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; display: none; }
    #btn-refresh { background: none; border: none; color: rgba(255,255,255,.8); font-size: 1.2rem; cursor: pointer; transition: color .2s; line-height: 1; }
    #btn-refresh:hover { color: #fff; }
    #btn-reset-counter { background: none; border: none; color: rgba(255,255,255,.6); font-size: .75rem; cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: color .2s; }
    #btn-reset-counter:hover { color: #fff; }
    #btn-refresh.spinning { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Layout */
    .layout { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
    @media (min-width: 900px) { .layout { flex-direction: row; } }

    /* Catalog */
    #catalog-panel { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    #search { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); font-size: .9rem; color: var(--text); outline: none; }
    #search:focus { box-shadow: 0 0 0 3px rgba(46,82,53,.25); }
    #categories { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    #categories::-webkit-scrollbar { display: none; }
    .cat-btn { flex-shrink: 0; padding: 5px 14px; border-radius: 99px; border: 1px solid var(--border); background: none; font-size: .8rem; font-weight: 500; cursor: pointer; color: var(--muted); transition: all .15s; white-space: nowrap; }
    .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    #msg { text-align: center; padding: 40px 0; color: var(--muted); font-size: .9rem; }
    #grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (min-width: 600px) { #grid { grid-template-columns: repeat(3, 1fr); } }

    /* Product card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 10px; transition: border-color .15s; }
    .card.selected { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
    .card.out { opacity: .5; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; }
    .card-name { font-size: .82rem; font-weight: 500; line-height: 1.3; }
    .card-stock { font-size: .7rem; padding: 2px 7px; border-radius: 99px; background: rgba(46,82,53,.15); color: var(--primary); white-space: nowrap; flex-shrink: 0; }
    .card-stock.empty { background: var(--border); color: var(--muted); }
    .card-price { font-size: 1rem; font-weight: 700; color: var(--primary); }
    .card-controls { display: flex; align-items: center; gap: 8px; }
    .btn-qty { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); background: none; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .btn-qty.plus { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-qty.plus:hover { background: var(--primary-hover); }
    .btn-qty:disabled { opacity: .3; cursor: default; }
    .qty-num { width: 22px; text-align: center; font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Cart */
    #cart-panel { border-top: 1px solid var(--border); background: var(--bg); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    @media (min-width: 900px) { #cart-panel { width: 300px; border-top: none; border-left: 1px solid var(--border); overflow-y: auto; } }
    .cart-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    #cart-empty { color: var(--muted); font-size: .85rem; text-align: center; padding: 20px 0; }
    #cart-items { display: flex; flex-direction: column; gap: 0; }
    .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
    .cart-row-name { color: var(--text); }
    .cart-row-sub { color: var(--muted); font-size: .75rem; }
    .cart-row-total { font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Payment toggle */
    .pay-toggle { display: flex; gap: 6px; }
    .pay-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: none; font-size: .85rem; font-weight: 500; cursor: pointer; transition: all .15s; color: var(--text); }
    .pay-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Total & confirm */
    .total-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid var(--border); }
    .total-label { color: var(--muted); font-size: .85rem; }
    .total-amount { font-size: 1.3rem; font-weight: 700; color: var(--primary); font-variant-numeric: tabular-nums; }
    #btn-confirm { width: 100%; padding: 12px; border-radius: 10px; background: var(--primary); color: #fff; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .15s; }
    #btn-confirm:hover { background: var(--primary-hover); }
    #btn-confirm:disabled { opacity: .5; cursor: default; }
    #btn-clear { width: 100%; padding: 6px; background: none; border: none; font-size: .8rem; color: var(--muted); cursor: pointer; }
    #btn-clear:hover { color: var(--text); }

    /* Orders bar */
    #orders-bar { border-top: 2px solid var(--primary); background: var(--bg); padding: 12px 16px; }
    .orders-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .orders-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--primary); }
    .orders-count-badge { background: var(--primary); color: #fff; font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
    #orders-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: thin; }
    .ticket { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; min-width: 200px; max-width: 240px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
    .ticket-header { display: flex; justify-content: space-between; align-items: center; }
    .ticket-id { font-size: .8rem; font-weight: 700; color: var(--primary); }
    .ticket-time { font-size: .75rem; color: var(--muted); }
    .ticket-items { font-size: .8rem; color: var(--text); display: flex; flex-direction: column; gap: 3px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .ticket-item { display: flex; justify-content: space-between; gap: 8px; }
    .ticket-item-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ticket-item-qty { flex-shrink: 0; color: var(--muted); }
    .ticket-footer { display: flex; flex-direction: column; gap: 6px; }
    .ticket-total { display: flex; justify-content: space-between; align-items: center; }
    .ticket-pay { font-size: .75rem; color: var(--muted); text-transform: capitalize; }
    .ticket-amount { font-size: 1rem; font-weight: 700; color: var(--primary); font-variant-numeric: tabular-nums; }
    .ticket-actions { display: flex; gap: 6px; }
    .btn-cancel-order { flex: 1; padding: 6px; border-radius: 8px; border: 1px solid var(--border); background: none; font-size: .8rem; cursor: pointer; color: var(--muted); transition: color .15s; }
    .btn-cancel-order:hover { color: var(--text); }
    .btn-deliver { flex: 2; padding: 6px; border-radius: 8px; border: none; background: var(--primary); color: #fff; font-size: .8rem; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-deliver:hover { background: var(--primary-hover); }
    .btn-deliver:disabled { opacity: .6; cursor: default; }

    /* Toggle de vista */
    #btn-toggle-view { display: none; background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4); color: #fff; font-size: .75rem; font-weight: 700; padding: 4px 10px; border-radius: 99px; cursor: pointer; font-family: inherit; transition: background .15s; white-space: nowrap; }
    #btn-toggle-view:hover { background: rgba(255,255,255,.35); }

    /* Orders bar en modo maximizado */
    #orders-bar.maximized { flex: 1; display: flex !important; flex-direction: column; overflow: hidden; }
    #orders-bar.maximized #orders-list { flex: 1; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
    #orders-bar.maximized .ticket { min-width: unset; max-width: unset; }

    /* Footer */
    footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: rgba(255,255,255,.5); text-align: center; font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; padding: 10px 16px 20px; z-index: 5; }

    /* Toast */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 10px; color: #fff; font-size: .9rem; font-weight: 500; box-shadow: 0 4px 12px rgba(0,0,0,.2); opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; }
    #toast.ok { background: #2d6a2d; }
    #toast.err { background: #8b1a1a; }
  </style>
</head>
<body>

<header>
  <h1>Cafe Diario</h1>
  <div class="header-right">
    <span id="badge"></span>
    <button id="btn-toggle-view"></button>
    <button id="btn-reset-counter" title="Reiniciar numeración de pedidos">↩ #1</button>
    <button id="btn-refresh" title="Actualizar catálogo">↻</button>
  </div>
</header>

<div class="layout">
  <section id="catalog-panel">
    <input id="search" type="search" placeholder="Buscar producto..." />
    <div id="categories"></div>
    <div id="msg">Cargando catálogo...</div>
    <div id="grid"></div>
  </section>

  <aside id="cart-panel">
    <div class="cart-label">Venta actual</div>
    <div id="cart-empty">Ningún producto seleccionado</div>
    <div id="cart-items"></div>
    <div class="pay-toggle" id="pay-toggle" style="display:none">
      <button class="pay-btn active" data-method="efectivo">Efectivo</button>
      <button class="pay-btn" data-method="mp">MercadoPago</button>
    </div>
    <div class="total-row" id="total-row" style="display:none">
      <span class="total-label">Total</span>
      <span class="total-amount" id="total-amount">$0</span>
    </div>
    <button id="btn-confirm" style="display:none">Cargar pedido</button>
    <button id="btn-clear" style="display:none">Limpiar selección</button>
  </aside>
</div>

<section id="orders-bar" style="display:none">
  <div class="orders-header">
    <span class="orders-label">Pedidos en curso</span>
    <span id="orders-count-badge" class="orders-count-badge"></span>
  </div>
  <div id="orders-list"></div>
</section>

<footer>Cafe Diario</footer>

<div id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwaswy-RvXHBy8i7M73xguPW9d6hX1MrdlGi2ynkboOhKIXSlsWqfSp7t-EuPqUZ5Hm/exec';

  let products = [];
  let cart = {}; // rowIndex → qty
  let paymentMethod = 'efectivo';
  let selectedCategory = null;
  let orders = [];
  let orderCounter = 1;
  let viewMode = 'nuevo'; // 'nuevo' | 'pedidos'

  // ── Apps Script calls ─────────────────────────────────────────────────────

  async function scriptGet(params) {
    const url = new URL(SCRIPT_URL);
    url.searchParams.set('t', Date.now()); // evita cache
    for (const [k, v] of Object.entries(params)) {
      url.searchParams.set(k, typeof v === 'object' ? JSON.stringify(v) : v);
    }
    const res = await fetch(url.toString());
    return res.json();
  }

  // ── Catalog ───────────────────────────────────────────────────────────────

  async function loadCatalog(manual = false) {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('spinning');
    btn.disabled = true;
    try {
      const data = await scriptGet({ action: 'catalog' });
      products = data;
      renderCategories();
      renderGrid();
      if (manual) showToast('Catálogo actualizado', true);
    } catch {
      document.getElementById('msg').textContent = 'Error al cargar el catálogo';
    } finally {
      btn.classList.remove('spinning');
      btn.disabled = false;
    }
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function renderCategories() {
    const cats = [...new Set(products.map(p => p.category).filter(Boolean))].sort();
    const container = document.getElementById('categories');
    container.innerHTML = ['Todos', ...cats].map(c => `
      <button class="cat-btn ${(c === 'Todos' && !selectedCategory) || c === selectedCategory ? 'active' : ''}" data-cat="${c}">${c}</button>
    `).join('');
  }

  function renderGrid() {
    const query = document.getElementById('search').value.toLowerCase();
    const filtered = products.filter(p =>
      p.name.toLowerCase().includes(query) &&
      (!selectedCategory || p.category === selectedCategory)
    );
    const msg = document.getElementById('msg');
    const grid = document.getElementById('grid');

    if (filtered.length === 0) {
      msg.textContent = query ? 'Sin resultados' : 'Sin productos';
      msg.style.display = 'block';
      grid.innerHTML = '';
      return;
    }

    msg.style.display = 'none';
    grid.innerHTML = filtered.map(p => {
      const qty = cart[p.rowIndex] ?? 0;
      const out = p.stock === 0;
      const unlimited = p.stock >= 9999;
      return `
        <div class="card ${qty > 0 ? 'selected' : ''} ${out ? 'out' : ''}" data-row="${p.rowIndex}">
          <div class="card-top">
            <span class="card-name">${p.name}</span>
            <span class="card-stock ${out ? 'empty' : ''}">${out ? 'sin stock' : unlimited ? 'Disponible' : p.stock + ' disp.'}</span>
          </div>
          <div class="card-price">$${p.price.toLocaleString('es-AR')}</div>
          <div class="card-controls">
            <button class="btn-qty minus" data-row="${p.rowIndex}" ${qty === 0 ? 'disabled' : ''}>−</button>
            <span class="qty-num">${qty}</span>
            <button class="btn-qty plus" data-row="${p.rowIndex}" ${out || (!unlimited && qty >= p.stock) ? 'disabled' : ''}>+</button>
          </div>
        </div>`;
    }).join('');
  }

  function renderCart() {
    const items = Object.entries(cart)
      .map(([ri, qty]) => ({ product: products.find(p => p.rowIndex === +ri), qty }))
      .filter(i => i.product);

    const empty = document.getElementById('cart-empty');
    const cartItems = document.getElementById('cart-items');
    const payToggle = document.getElementById('pay-toggle');
    const totalRow = document.getElementById('total-row');
    const btnConfirm = document.getElementById('btn-confirm');
    const btnClear = document.getElementById('btn-clear');
    const badge = document.getElementById('badge');

    const hasItems = items.length > 0;
    empty.style.display = hasItems ? 'none' : 'block';
    payToggle.style.display = hasItems ? 'flex' : 'none';
    totalRow.style.display = hasItems ? 'flex' : 'none';
    btnConfirm.style.display = hasItems ? 'block' : 'none';
    btnClear.style.display = hasItems ? 'block' : 'none';

    const totalQty = items.reduce((s, i) => s + i.qty, 0);
    badge.style.display = totalQty > 0 ? 'inline' : 'none';
    badge.textContent = `${totalQty} ítem${totalQty > 1 ? 's' : ''}`;

    cartItems.innerHTML = items.map(({ product: p, qty }) => `
        <div class="cart-row">
          <div>
            <div class="cart-row-name">${p.name}</div>
            <div class="cart-row-sub">×${qty}</div>
          </div>
          <div class="cart-row-total">$${(p.price * qty).toLocaleString('es-AR')}</div>
        </div>`).join('');

    const total = items.reduce((s, { product: p, qty }) => s + p.price * qty, 0);
    document.getElementById('total-amount').textContent = '$' + total.toLocaleString('es-AR');
  }

  function render() { renderGrid(); renderCart(); }

  // ── View mode ─────────────────────────────────────────────────────────────

  function applyViewMode() {
    const hasOrders = orders.length > 0;
    if (!hasOrders) viewMode = 'nuevo';

    const layout = document.querySelector('.layout');
    const ordersBar = document.getElementById('orders-bar');
    const btn = document.getElementById('btn-toggle-view');

    btn.style.display = hasOrders ? 'inline-block' : 'none';
    btn.textContent = viewMode === 'nuevo' ? `Pedidos ${orders.length}` : '← Nuevo';

    if (!hasOrders || viewMode === 'nuevo') {
      layout.style.display = '';
      ordersBar.classList.remove('maximized');
      ordersBar.style.display = hasOrders ? 'block' : 'none';
    } else {
      layout.style.display = 'none';
      ordersBar.classList.add('maximized');
    }
  }

  // ── Orders ────────────────────────────────────────────────────────────────

  function renderOrders() {
    const list = document.getElementById('orders-list');
    const badge = document.getElementById('orders-count-badge');
    badge.textContent = orders.length;
    list.innerHTML = orders.map(o => `
      <div class="ticket" data-order="${o.id}">
        <div class="ticket-header">
          <span class="ticket-id">Pedido #${o.id}</span>
          <span class="ticket-time">${o.time}</span>
        </div>
        <div class="ticket-items">
          ${o.items.map(i => `
            <div class="ticket-item">
              <span class="ticket-item-name">${i.name}</span>
              <span class="ticket-item-qty">×${i.qty}</span>
            </div>`).join('')}
        </div>
        <div class="ticket-footer">
          <div class="ticket-total">
            <span class="ticket-pay">${o.paymentMethod}</span>
            <span class="ticket-amount">$${o.total.toLocaleString('es-AR')}</span>
          </div>
          <div class="ticket-actions">
            <button class="btn-cancel-order" data-cancel="${o.id}">Cancelar</button>
            <button class="btn-deliver" data-deliver="${o.id}">Entregar</button>
          </div>
        </div>
      </div>`).join('');
    applyViewMode();
  }

  async function deliverOrder(id) {
    const order = orders.find(o => o.id === id);
    if (!order) return;
    const btn = document.querySelector(`[data-deliver="${id}"]`);
    if (btn) { btn.disabled = true; btn.textContent = 'Procesando...'; }
    try {
      const res = await scriptGet({ action: 'sale', items: order.items, paymentMethod: order.paymentMethod });
      if (res.ok) {
        orders = orders.filter(o => o.id !== id);
        renderOrders();
        showToast(`Pedido #${id} entregado`, true);
      } else {
        showToast('Error al confirmar el pedido', false);
        if (btn) { btn.disabled = false; btn.textContent = 'Entregar'; }
      }
    } catch {
      showToast('Error de conexión', false);
      if (btn) { btn.disabled = false; btn.textContent = 'Entregar'; }
    }
  }

  // ── Events ────────────────────────────────────────────────────────────────

  document.getElementById('grid').addEventListener('click', e => {
    const btn = e.target.closest('.btn-qty');
    if (!btn) return;
    const ri = +btn.dataset.row;
    const p = products.find(p => p.rowIndex === ri);
    if (!p) return;
    if (btn.classList.contains('plus')) {
      const maxQty = p.stock >= 9999 ? 999 : p.stock;
      cart[ri] = Math.min((cart[ri] ?? 0) + 1, maxQty);
    } else {
      cart[ri] = (cart[ri] ?? 1) - 1;
      if (cart[ri] <= 0) delete cart[ri];
    }
    render();
  });

  document.getElementById('search').addEventListener('input', renderGrid);

  document.getElementById('categories').addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    selectedCategory = btn.dataset.cat === 'Todos' ? null : btn.dataset.cat;
    renderCategories();
    renderGrid();
  });

  document.getElementById('pay-toggle').addEventListener('click', e => {
    const btn = e.target.closest('.pay-btn');
    if (!btn) return;
    paymentMethod = btn.dataset.method;
    document.querySelectorAll('.pay-btn').forEach(b => b.classList.toggle('active', b.dataset.method === paymentMethod));
    render();
  });

  document.getElementById('btn-clear').addEventListener('click', () => { cart = {}; render(); });

  document.getElementById('btn-refresh').addEventListener('click', () => loadCatalog(true));

  document.getElementById('btn-reset-counter').addEventListener('click', () => {
    if (orders.length > 0) { showToast('Hay pedidos pendientes', false); return; }
    orderCounter = 1;
    showToast('Numeración reiniciada', true);
  });

  document.getElementById('btn-confirm').addEventListener('click', () => {
    const items = Object.entries(cart).map(([ri, qty]) => {
      const p = products.find(p => p.rowIndex === +ri);
      return { rowIndex: p.rowIndex, name: p.name, qty, price: p.price, category: p.category || '' };
    });
    const total = items.reduce((s, i) => s + i.price * i.qty, 0);
    const id = orderCounter++;
    orders.push({
      id,
      items,
      total,
      paymentMethod,
      time: new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
    });
    cart = {};
    render();
    renderOrders();
    showToast(`Pedido #${id} cargado`, true);
  });

  document.getElementById('orders-list').addEventListener('click', e => {
    const deliverBtn = e.target.closest('[data-deliver]');
    if (deliverBtn) { deliverOrder(+deliverBtn.dataset.deliver); return; }
    const cancelBtn = e.target.closest('[data-cancel]');
    if (cancelBtn) {
      const id = +cancelBtn.dataset.cancel;
      orders = orders.filter(o => o.id !== id);
      renderOrders();
      showToast(`Pedido #${id} cancelado`, false);
    }
  });

  document.getElementById('btn-toggle-view').addEventListener('click', () => {
    viewMode = viewMode === 'nuevo' ? 'pedidos' : 'nuevo';
    applyViewMode();
  });

  // ── Toast ─────────────────────────────────────────────────────────────────

  function showToast(msg, ok) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (ok ? 'ok' : 'err');
    setTimeout(() => t.className = '', 3000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
